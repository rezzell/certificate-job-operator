# This rule is not used by the project certificate-job-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to certificates.rezzell.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: certificate-job-operator
    app.kubernetes.io/managed-by: kustomize
  name: certificatejob-viewer-role
rules:
- apiGroups:
  - certificates.rezzell.com
  resources:
  - certificatejobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - certificates.rezzell.com
  resources:
  - certificatejobs/status
  verbs:
  - get
