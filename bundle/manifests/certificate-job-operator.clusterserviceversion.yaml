          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - batch
          resources:
          - jobs
          verbs:
          - create
          - get
          - list
          - watch
        - apiGroups:
          - cert-manager.io
          resources:
          - certificates
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - certificates.rezzell.com
          resources:
          - certificatejobs
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - certificates.rezzell.com
          resources:
          - certificatejobs/status
          verbs:
          - get
          - patch
          - update
        serviceAccountName: certificate-job-operator-controller-manager
    strategy: deployment
