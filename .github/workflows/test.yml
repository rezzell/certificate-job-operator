name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Running Tests
        run: |
          go mod tidy
          make test
