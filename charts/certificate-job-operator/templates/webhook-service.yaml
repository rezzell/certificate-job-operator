{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "certificate-job-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "certificate-job-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "certificate-job-operator.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.webhook.service.port }}
      targetPort: {{ .Values.webhook.service.targetPort }}
      protocol: TCP
      name: https
{{- end }}
