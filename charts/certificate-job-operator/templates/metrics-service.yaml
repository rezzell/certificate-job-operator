{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "certificate-job-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "certificate-job-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "certificate-job-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.metrics.service.port }}
      targetPort: 8443
      protocol: TCP
{{- end }}
